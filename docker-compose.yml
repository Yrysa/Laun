services:
  laun_postgres_core:
    image: postgres:16-alpine
    container_name: laun_postgres_core
    restart: unless-stopped
    environment:
      POSTGRES_DB: laun_db
      POSTGRES_USER: laun_user
      POSTGRES_PASSWORD: laun_password
    ports:
      - "5432:5432"
    volumes:
      - laun_postgres_volume:/var/lib/postgresql/data

  laun_api_server:
    image: python:3.12-slim
    container_name: laun_api_server
    restart: unless-stopped
    working_dir: /srv/laun_backend
    volumes:
      - ./laun_backend:/srv/laun_backend
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn laun_app.laun_main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./laun_backend/.env.example
    environment:
      DATABASE_URL: postgresql://laun_user:laun_password@laun_postgres_core:5432/laun_db
    ports:
      - "8000:8000"
    depends_on:
      - laun_postgres_core

  laun_web_client:
    image: node:22-alpine
    container_name: laun_web_client
    restart: unless-stopped
    working_dir: /srv/laun_frontend
    volumes:
      - ./laun_frontend:/srv/laun_frontend
      - laun_node_volume:/srv/laun_frontend/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - laun_api_server

volumes:
  laun_postgres_volume:
  laun_node_volume:
